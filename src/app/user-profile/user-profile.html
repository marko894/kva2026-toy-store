<div class="profile-page">
  @if (isLoading()) {
    <p>Loading profile...</p>
  } @else if (user()) {
    <mat-card class="profile-card">
      <mat-card-content>
        <h1 class="page-title">Moj profil</h1>
        <div class="two-columns">
          <mat-form-field appearance="outline">
            <mat-label>Ime</mat-label>
            <input matInput [(ngModel)]="firstName" />
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Prezime</mat-label>
            <input matInput [(ngModel)]="lastName" />
          </mat-form-field>
        </div>

        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput [value]="user()!.email" readonly />
        </mat-form-field>

        <div class="two-columns">
          <mat-form-field appearance="outline">
            <mat-label>Telefon</mat-label>
            <input matInput [(ngModel)]="phone" />
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Adresa</mat-label>
            <input matInput [(ngModel)]="address" />
          </mat-form-field>
        </div>

        <div class="favorites-section">
          <h2>Omiljeni tip igracaka</h2>
          <div class="favorites-grid">
            @for (type of toyTypes(); track type.typeId) {
              <mat-checkbox [checked]="isFavorite(type.name)" (change)="toggleFavorite(type.name)">
                {{ type.name }}
              </mat-checkbox>
            }
          </div>
        </div>

        <div class="actions-row" style="margin-bottom: 40px">
          <button mat-raised-button color="primary" (click)="saveProfile()">Sacuvaj</button>
        </div>

        <mat-divider></mat-divider>

        <div class="section-header password-section">
          <h2>Promeni lozinku</h2>
        </div>

        <mat-form-field appearance="outline">
          <mat-label>Trenutna lozinka</mat-label>
          <input matInput type="password" [(ngModel)]="currentPassword" />
        </mat-form-field>

        <div class="two-columns">
          <mat-form-field appearance="outline">
            <mat-label>Nova lozinka</mat-label>
            <input matInput type="password" [(ngModel)]="newPassword" />
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Potvrdi novu lozinku</mat-label>
            <input matInput type="password" [(ngModel)]="confirmPassword" />
          </mat-form-field>
        </div>

        <div class="actions-row">
          <button mat-raised-button color="accent" (click)="changePassword()">Sacuvaj</button>
        </div>
      </mat-card-content>
    </mat-card>
  }
</div>
