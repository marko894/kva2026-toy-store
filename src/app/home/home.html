<div class="home-container">
  <h1>Toy Store</h1>
  <p>Browse available toys</p>

  @if (isLoading()) {
    <div class="loading-wrapper">
      <mat-spinner diameter="50"></mat-spinner>
    </div>
  } @else if (errorMessage()) {
    <mat-card>
      <mat-card-content>
        <p>{{ errorMessage() }}</p>
      </mat-card-content>
    </mat-card>
  } @else {
    <div class="toy-grid">
      @for (toy of toys(); track toy.toyId) {
        <mat-card class="toy-card">
          <img mat-card-image [src]="getImageUrl(toy.imageUrl)" [alt]="toy.name" />

          <mat-card-content>
            <h2>{{ toy.name }}</h2>
            <p>{{ toy.description }}</p>
            <p><strong>Tip:</strong> {{ toy.type.name }}</p>
            <p><strong>Godine:</strong> {{ toy.ageGroup.name }}</p>
            <p><strong>Cena:</strong> {{ toy.price }} RSD</p>
          </mat-card-content>

          <mat-card-actions>
            <a mat-button [routerLink]="['/toy', toy.toyId]">Detalji</a>
          </mat-card-actions>
        </mat-card>
      }
    </div>
  }
</div>
